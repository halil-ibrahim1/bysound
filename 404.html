<!DOCTYPE html>
<html lang="tr">
<head>
  <!-- ========================================== BÖLÜM: HEAD VE META BİLGİLERİ ========================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sinyal Koptu | By Sound</title>
  <style>
    /* Sahne Görselli ve Monokrom Karanlık Tasarım */
    body {
      margin: 0;
      padding: 0;
      /* Arka plana stadyum/maç görselini çektik ve üzerine %85 siyah filtre attık */
      background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), 
            url('/bysound/assets/photos/besiktas-match.jpg'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      
      color: #ffffff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 0 20px;
    }

    /* Nabız gibi atan karanlık 404 yazısı */
    .glitch {
      font-size: 10rem;
      font-weight: 900;
      margin: 0;
      line-height: 1;
      color: rgba(255, 255, 255, 0.1); 
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      animation: pulse 2.5s infinite alternate;
      letter-spacing: -5px;
    }

    .title {
      font-size: 2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin: 10px 0 20px;
      color: #eaeaea;
      text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
    }

    .desc {
      font-size: 1.15rem;
      color: #aaa;
      max-width: 500px;
      margin: 0 auto 40px;
      line-height: 1.7;
      text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.8);
    }

    /* Şık ve Minimalist Buton */
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: transparent;
      color: #fff;
      border: 1px solid #666;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: all 0.4s ease;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: #fff;
      color: #050505;
      border-color: #fff;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    /* Işık animasyonu */
    @keyframes pulse {
      0% { text-shadow: 0 0 15px rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.05); }
      100% { text-shadow: 0 0 45px rgba(255,255,255,0.4); color: rgba(255, 255, 255, 0.2); }
    }
  </style>
  
  <!-- Google tag (gtag.js) WEB SİTESİ VERİLERİ İZLEMEK İÇİN GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK6RTKWVZG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DK6RTKWVZG');
  </script>
</head>

<body>
  <!-- ========================================== BÖLÜM: 404 İÇERİK ========================================== -->
  <div class="container">
    <h1 class="glitch">404</h1>
    <h2 class="title">SİNYAL KOPTU</h2>
    <p class="desc">Bağlantı bulunamadı. <br>Görünüşe göre bağlantıda bir kopukluk var, lütfen ana sayfaya geri dönün.</p>
    <a href="/bysound/index.html" class="btn">ANA SAYFAYA DÖN</a>  <!--<a href="/" class="btn">ANA SAYFAYA DÖN</a>-->
  </div>

</body>
</html>
